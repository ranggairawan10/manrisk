<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manajemen Risiko untuk Semua | NUVY by Nusva</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:      #0A3D62;
      --navy-80:   #1a5a8a;
      --teal:      #0FA3B1;
      --teal-20:   #e0f5f7;
      --cyan:      #1ECAD3;
      --gold:      #F2C94C;
      --gold-20:   #fdf6d8;
      --white:     #FFFFFF;
      --gray-50:   #F9FAFB;
      --gray-100:  #F3F4F6;
      --gray-200:  #E5E7EB;
      --gray-400:  #9CA3AF;
      --gray-500:  #6B7280;
      --gray-700:  #374151;
      --gray-900:  #111827;
      --green:     #10B981;
      --green-10:  #d1fae5;
      --red:       #EF4444;
      --red-10:    #fee2e2;
      --font:      'Plus Jakarta Sans', sans-serif;
      --sidebar:   280px;
      --topbar:    60px;
      --radius:    12px;
      --shadow:    0 2px 12px rgba(10,61,98,.10);
      --shadow-lg: 0 8px 32px rgba(10,61,98,.15);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--white); color: var(--gray-900); min-height: 100vh; }
    a { text-decoration: none; color: inherit; }
    button { font-family: var(--font); cursor: pointer; border: none; outline: none; }
    input { font-family: var(--font); }

    /* ─── ANIMATIONS ─── */
    @keyframes fadeIn  { from { opacity:0; transform:translateY(14px) } to { opacity:1; transform:translateY(0) } }
    @keyframes slideIn { from { opacity:0; transform:translateX(-20px) } to { opacity:1; transform:translateX(0) } }
    @keyframes shake   { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
    @keyframes popIn   { 0%{transform:scale(.85);opacity:0} 60%{transform:scale(1.04)} 100%{transform:scale(1);opacity:1} }
    @keyframes pulse   { 0%,100%{opacity:1} 50%{opacity:.5} }
    .fade-in  { animation: fadeIn  .45s ease both; }
    .slide-in { animation: slideIn .35s ease both; }
    .shake    { animation: shake   .4s ease; }

    /* ─── SCROLLBAR ─── */
    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-track { background: var(--gray-100); }
    ::-webkit-scrollbar-thumb { background: var(--gray-300, #d1d5db); border-radius:6px; }

    /* ══════════════════════════════════════
       LOGIN PAGE
    ══════════════════════════════════════ */
    .login-page {
      min-height: 100vh;
      background: var(--gray-50);
      background-image:
        radial-gradient(circle at 15% 20%, rgba(15,163,177,.08) 0%, transparent 55%),
        radial-gradient(circle at 85% 80%, rgba(10,61,98,.06) 0%, transparent 55%),
        repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(10,61,98,.03) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(10,61,98,.03) 40px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-wrapper {
      width: 100%;
      max-width: 440px;
      animation: fadeIn .6s ease both;
    }
    .login-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      justify-content: center;
    }
    .login-badge .mark {
      width: 36px; height: 36px;
      background: var(--navy);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      color: var(--gold);
      font-weight: 800;
      font-size: 15px;
      letter-spacing: -.5px;
    }
    .login-badge .brand { font-weight: 700; font-size: 18px; color: var(--navy); letter-spacing: -.3px; }
    .login-badge .brand span { color: var(--teal); }
    .login-card {
      background: var(--white);
      border-radius: 20px;
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      border: 1px solid var(--gray-200);
    }
    .login-header {
      background: linear-gradient(135deg, var(--navy) 0%, #0d4f80 100%);
      padding: 32px 36px 28px;
      position: relative;
      overflow: hidden;
    }
    .login-header::before {
      content: '';
      position: absolute;
      top: -20px; right: -20px;
      width: 120px; height: 120px;
      background: rgba(242,201,76,.12);
      border-radius: 50%;
    }
    .login-header::after {
      content: '';
      position: absolute;
      bottom: -30px; right: 40px;
      width: 80px; height: 80px;
      background: rgba(15,163,177,.15);
      border-radius: 50%;
    }
    .login-header h1 { color: var(--white); font-size: 22px; font-weight: 800; line-height: 1.3; position: relative; z-index: 1; }
    .login-header h1 .accent { color: var(--gold); }
    .login-header p { color: rgba(255,255,255,.7); font-size: 13px; margin-top: 6px; position: relative; z-index: 1; line-height: 1.5; }
    .login-highlights {
      display: flex; gap: 12px; margin-top: 20px; position: relative; z-index: 1; flex-wrap: wrap;
    }
    .login-highlights .chip {
      background: rgba(255,255,255,.12);
      color: rgba(255,255,255,.85);
      font-size: 11px; font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,.18);
      letter-spacing: .2px;
    }
    .login-body { padding: 32px 36px 36px; }
    .login-body label { display: block; font-size: 12px; font-weight: 600; color: var(--gray-500); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; margin-top: 18px; }
    .login-body label:first-child { margin-top: 0; }
    .login-input {
      width: 100%;
      height: 46px;
      border: 1.5px solid var(--gray-200);
      border-radius: 10px;
      padding: 0 14px;
      font-size: 15px;
      color: var(--gray-900);
      background: var(--gray-50);
      transition: border-color .2s, box-shadow .2s;
    }
    .login-input:focus { outline: none; border-color: var(--teal); background: var(--white); box-shadow: 0 0 0 3px rgba(15,163,177,.12); }
    .login-error { display: none; color: var(--red); font-size: 12px; margin-top: 8px; font-weight: 500; }
    .login-error.show { display: block; }
    .btn-login {
      width: 100%; height: 48px;
      background: linear-gradient(135deg, var(--teal), var(--cyan));
      color: var(--white);
      font-size: 15px; font-weight: 700;
      border-radius: 10px;
      margin-top: 24px;
      transition: transform .15s, box-shadow .15s;
      letter-spacing: .2px;
    }
    .btn-login:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(15,163,177,.35); }
    .btn-login:active { transform: translateY(0); }
    .login-footer { text-align: center; margin-top: 20px; font-size: 12px; color: var(--gray-400); }
    .login-footer span { color: var(--teal); font-weight: 600; }

    /* ══════════════════════════════════════
       MAIN APP LAYOUT
    ══════════════════════════════════════ */
    .app-layout { display: flex; height: 100vh; overflow: hidden; }

    /* ─── SIDEBAR ─── */
    .sidebar {
      width: var(--sidebar);
      background: var(--navy);
      display: flex;
      flex-direction: column;
      height: 100vh;
      flex-shrink: 0;
      overflow: hidden;
    }
    .sidebar-top {
      padding: 20px 20px 16px;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .sidebar-logo {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none;
    }
    .sidebar-logo .mark {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--teal), var(--cyan));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: var(--white); font-weight: 800; font-size: 13px;
    }
    .sidebar-logo .name { color: var(--white); font-weight: 700; font-size: 15px; letter-spacing: -.2px; }
    .sidebar-logo .name span { color: var(--teal); }
    .sidebar-course-info {
      margin-top: 14px;
      background: rgba(255,255,255,.06);
      border-radius: 10px;
      padding: 12px 14px;
    }
    .sidebar-course-info .course-name {
      color: rgba(255,255,255,.5);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .8px;
      font-weight: 600;
    }
    .sidebar-course-info .course-title {
      color: var(--white);
      font-size: 13px;
      font-weight: 600;
      margin-top: 3px;
      line-height: 1.4;
    }
    .sidebar-progress-bar {
      height: 4px;
      background: rgba(255,255,255,.1);
      border-radius: 2px;
      margin-top: 10px;
      overflow: hidden;
    }
    .sidebar-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--teal), var(--cyan));
      border-radius: 2px;
      transition: width .6s ease;
    }
    .sidebar-progress-text {
      color: rgba(255,255,255,.45);
      font-size: 10px;
      margin-top: 5px;
      text-align: right;
    }
    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: 12px 12px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,.1) transparent;
    }
    .sidebar-nav::-webkit-scrollbar { width: 4px; }
    .sidebar-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 4px; }
    .nav-section-label {
      color: rgba(255,255,255,.3);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .8px;
      font-weight: 600;
      padding: 8px 8px 4px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background .18s;
      margin-bottom: 2px;
      position: relative;
    }
    .nav-item:hover { background: rgba(255,255,255,.07); }
    .nav-item.active { background: rgba(15,163,177,.18); }
    .nav-item.active .nav-num { background: var(--teal); color: var(--white); }
    .nav-num {
      width: 24px; height: 24px;
      background: rgba(255,255,255,.1);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700;
      color: rgba(255,255,255,.5);
      flex-shrink: 0;
      transition: background .18s;
    }
    .nav-text { flex: 1; }
    .nav-title { color: rgba(255,255,255,.75); font-size: 12px; font-weight: 500; line-height: 1.3; }
    .nav-item.active .nav-title { color: var(--white); font-weight: 600; }
    .nav-item.done .nav-title { color: rgba(255,255,255,.55); }
    .nav-badge {
      font-size: 9px; font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: .3px;
    }
    .nav-badge.quiz { background: rgba(242,201,76,.2); color: var(--gold); }
    .nav-check {
      color: var(--green);
      font-size: 12px;
      flex-shrink: 0;
    }
    .sidebar-bottom {
      padding: 12px;
      border-top: 1px solid rgba(255,255,255,.08);
    }
    .btn-back-dash {
      width: 100%;
      background: rgba(255,255,255,.06);
      color: rgba(255,255,255,.65);
      font-size: 12px;
      font-weight: 600;
      padding: 9px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,.1);
      transition: background .18s, color .18s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-back-dash:hover { background: rgba(255,255,255,.1); color: var(--white); }

    /* ─── MAIN CONTENT AREA ─── */
    .main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--gray-50);
    }
    .topbar {
      height: var(--topbar);
      background: var(--white);
      border-bottom: 1px solid var(--gray-200);
      display: flex; align-items: center;
      padding: 0 28px;
      gap: 16px;
      flex-shrink: 0;
    }
    .topbar-breadcrumb { flex: 1; display: flex; align-items: center; gap: 6px; font-size: 13px; }
    .topbar-breadcrumb .crumb-home { color: var(--gray-400); font-weight: 500; cursor: pointer; }
    .topbar-breadcrumb .crumb-home:hover { color: var(--navy); }
    .topbar-breadcrumb .sep { color: var(--gray-300); }
    .topbar-breadcrumb .crumb-current { color: var(--navy); font-weight: 600; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .user-pill {
      display: flex; align-items: center; gap: 8px;
      background: var(--gray-50);
      border: 1px solid var(--gray-200);
      border-radius: 20px;
      padding: 4px 12px 4px 6px;
    }
    .user-avatar {
      width: 28px; height: 28px;
      background: var(--navy);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--gold);
      font-size: 11px; font-weight: 800;
    }
    .user-name { font-size: 12px; font-weight: 600; color: var(--gray-700); }

    .content-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 28px;
    }

    /* ─── CHAPTER CONTENT ─── */
    .chapter-header {
      background: var(--white);
      border-radius: var(--radius);
      border: 1px solid var(--gray-200);
      padding: 28px 32px;
      margin-bottom: 20px;
      display: flex; align-items: flex-start; gap: 20px;
      box-shadow: var(--shadow);
    }
    .ch-num-badge {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, var(--navy), var(--navy-80));
      border-radius: 14px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      flex-shrink: 0;
      color: var(--white);
    }
    .ch-num-badge .label { font-size: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; opacity: .7; }
    .ch-num-badge .num { font-size: 22px; font-weight: 800; line-height: 1; }
    .ch-meta .ch-tag {
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .6px;
      color: var(--teal);
      margin-bottom: 5px;
    }
    .ch-meta h2 { font-size: 22px; font-weight: 800; color: var(--navy); line-height: 1.2; }
    .ch-meta .ch-time { font-size: 12px; color: var(--gray-400); margin-top: 6px; font-weight: 500; }
    .ch-meta .ch-time span { color: var(--teal); font-weight: 600; }

    .content-card {
      background: var(--white);
      border-radius: var(--radius);
      border: 1px solid var(--gray-200);
      padding: 24px 28px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
      animation: fadeIn .4s ease both;
    }
    .content-card h3 {
      font-size: 16px; font-weight: 700; color: var(--navy);
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--teal-20);
    }
    .content-card p { font-size: 14px; line-height: 1.75; color: var(--gray-700); margin-bottom: 10px; }
    .content-card p:last-child { margin-bottom: 0; }
    .content-card ul, .content-card ol { padding-left: 20px; }
    .content-card li { font-size: 14px; line-height: 1.75; color: var(--gray-700); margin-bottom: 4px; }

    .highlight-box {
      background: var(--teal-20);
      border-left: 4px solid var(--teal);
      border-radius: 8px;
      padding: 14px 16px;
      margin: 14px 0;
    }
    .highlight-box .hb-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--teal); margin-bottom: 4px; }
    .highlight-box p { font-size: 13px; line-height: 1.65; color: var(--gray-700); margin: 0; }

    .gold-box {
      background: var(--gold-20);
      border-left: 4px solid var(--gold);
      border-radius: 8px;
      padding: 14px 16px;
      margin: 14px 0;
    }
    .gold-box .hb-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: #b8941c; margin-bottom: 4px; }
    .gold-box p { font-size: 13px; line-height: 1.65; color: var(--gray-700); margin: 0; }

    .stat-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 12px;
      margin: 16px 0;
    }
    .stat-box {
      background: var(--gray-50);
      border: 1px solid var(--gray-200);
      border-radius: 10px;
      padding: 14px 12px;
      text-align: center;
    }
    .stat-box .val { font-size: 26px; font-weight: 800; color: var(--navy); line-height: 1; }
    .stat-box .val span { font-size: 14px; color: var(--teal); }
    .stat-box .lbl { font-size: 11px; color: var(--gray-500); margin-top: 4px; line-height: 1.4; font-weight: 500; }

    .cat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
      margin-top: 14px;
    }
    .cat-card {
      background: var(--gray-50);
      border: 1px solid var(--gray-200);
      border-radius: 10px;
      padding: 14px;
    }
    .cat-card .cat-icon { font-size: 22px; margin-bottom: 6px; }
    .cat-card .cat-name { font-size: 13px; font-weight: 700; color: var(--navy); margin-bottom: 4px; }
    .cat-card .cat-ex { font-size: 12px; color: var(--gray-500); line-height: 1.5; }

    .steps-list { margin-top: 12px; }
    .step-item {
      display: flex; gap: 14px; align-items: flex-start;
      padding: 12px 0;
      border-bottom: 1px solid var(--gray-100);
    }
    .step-item:last-child { border-bottom: none; }
    .step-num {
      width: 30px; height: 30px;
      background: var(--navy);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--white); font-size: 12px; font-weight: 800;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .step-num.special { background: var(--teal); }
    .step-body .step-title { font-size: 14px; font-weight: 700; color: var(--navy); margin-bottom: 3px; }
    .step-body .step-desc { font-size: 13px; color: var(--gray-600, #4b5563); line-height: 1.6; }

    /* Risk Matrix */
    .risk-matrix-wrap { overflow-x: auto; margin-top: 14px; }
    .risk-matrix {
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--gray-200);
      width: 100%;
      min-width: 320px;
    }
    .rm-row { display: flex; }
    .rm-axis-y {
      width: 36px; min-height: 36px;
      background: var(--gray-100);
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 700; color: var(--gray-500);
      text-transform: uppercase;
      letter-spacing: .4px;
      border-right: 1px solid var(--gray-200);
      writing-mode: vertical-rl;
      text-orientation: mixed;
    }
    .rm-col-header {
      flex: 1; min-height: 32px;
      background: var(--gray-100);
      border-bottom: 1px solid var(--gray-200);
      border-right: 1px solid var(--gray-200);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: var(--gray-600, #4b5563);
      text-transform: uppercase; letter-spacing: .4px;
    }
    .rm-cell {
      flex: 1; min-height: 64px;
      border-right: 1px solid rgba(255,255,255,.25);
      border-bottom: 1px solid rgba(255,255,255,.25);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: var(--white);
      text-align: center; padding: 6px;
      transition: opacity .2s;
      cursor: pointer;
      line-height: 1.3;
    }
    .rm-cell:hover { opacity: .8; }
    .rm-cell.green  { background: #10B981; }
    .rm-cell.yellow { background: #F59E0B; }
    .rm-cell.red    { background: #EF4444; }
    .rm-cell .rm-score { font-size: 18px; font-weight: 800; }
    .rm-row-label {
      width: 36px;
      background: var(--gray-100);
      border-right: 1px solid var(--gray-200);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: var(--gray-500);
    }

    /* 4T Cards */
    .four-t-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
      margin-top: 16px;
    }
    .t-card {
      border-radius: 12px;
      padding: 18px;
      border: 1.5px solid;
    }
    .t-card.tolerate { background: #f0fdf4; border-color: #86efac; }
    .t-card.treat    { background: #eff6ff; border-color: #93c5fd; }
    .t-card.transfer { background: var(--gold-20); border-color: #fcd34d; }
    .t-card.terminate{ background: #fef2f2; border-color: #fca5a5; }
    .t-icon { font-size: 24px; margin-bottom: 8px; }
    .t-name { font-size: 15px; font-weight: 800; color: var(--navy); margin-bottom: 4px; }
    .t-sub  { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; color: var(--gray-500); margin-bottom: 8px; }
    .t-desc { font-size: 13px; color: var(--gray-700); line-height: 1.6; }
    .t-ex   { font-size: 12px; color: var(--gray-500); margin-top: 6px; font-style: italic; line-height: 1.5; }

    /* Case study cards */
    .case-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; margin-top: 16px; }
    .case-card {
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--gray-200);
      box-shadow: var(--shadow);
    }
    .case-head {
      padding: 16px 18px 12px;
      display: flex; align-items: center; gap: 12px;
    }
    .case-logo {
      width: 42px; height: 42px;

      done: new Set(),
      quizDone: {},   // chId: { score, total }

    /* ═══════════════════════════════════════════════

    const CHAPTERS = [
      {
        id: 1, icon: '🎯', time: '5 menit',
        tag: 'Bab 1', title: 'Risiko itu Sebenarnya Apa?',
        content: () => `
          <div class="content-card fade-in">
            <h3>Analogi Sederhana</h3>
            <p>Bayangkan kamu akan menyeberang jalan. Ada kemungkinan kamu tertabung kendaraan yang melintas. Kemungkinan itulah yang disebut risiko. Risiko bukan kejadian buruknya itu sendiri, melainkan <strong>kemungkinan kejadian buruk terjadi</strong>, plus seberapa parah akibatnya kalau benar terjadi.</p>
            <div class="highlight-box">
              <div class="hb-label">Definisi Resmi (ISO 31000)</div>
              <p>Risiko adalah <strong>pengaruh ketidakpastian terhadap tujuan.</strong> Artinya, setiap kali ada rencana atau target, selalu ada hal yang bisa membuat hasilnya meleset, entah ke arah lebih buruk (ancaman) maupun ke arah yang justru lebih baik dari dugaan (peluang).</p>
            </div>
          </div>
          <div class="content-card fade-in">
            <h3>Dua Kata Kunci yang Akan Selalu Muncul</h3>
            <div class="cat-grid">
              <div class="cat-card">
                <div class="cat-icon">📊</div>
                <div class="cat-name">Kemungkinan</div>
                <div class="cat-ex">Seberapa besar peluang sesuatu terjadi. Bahasa teknisnya: <em>likelihood</em> atau <em>probabilitas</em>.</div>
              </div>
              <div class="cat-card">
                <div class="cat-icon">💥</div>
                <div class="cat-name">Dampak</div>
                <div class="cat-ex">Seberapa besar kerugian atau gangguan kalau hal itu sampai terjadi. Bahasa teknisnya: <em>impact</em> atau <em>consequence</em>.</div>
              </div>
            </div>
            <div class="gold-box" style="margin-top:14px">
              <div class="hb-label">Rumus Mental</div>
              <p>Risiko yang <strong>kemungkinannya besar + dampaknya besar</strong> adalah yang paling perlu diwaspadai. Risiko yang kemungkinannya kecil + dampaknya kecil boleh dibiarkan dulu. Begitulah cara kita menentukan prioritas.</p>
            </div>
          </div>
          <div class="content-card fade-in">
            <h3>Kotak Istilah Wajib Tahu</h3>
            <ul>
              <li><strong>Manajemen:</strong> kegiatan mengatur sesuatu secara sengaja dan terencana.</li>
              <li><strong>Mitigasi:</strong> tindakan untuk memperkecil kemungkinan atau dampak sebuah risiko. Kalau menyeberang lewat jembatan penyeberangan, itu mitigasi.</li>
              <li><strong>Ancaman:</strong> risiko yang berpotensi merugikan.</li>
              <li><strong>Peluang:</strong> ketidakpastian yang kalau terwujud justru menguntungkan.</li>
            </ul>
          </div>`
      },
      {
        id: 2, icon: '💡', time: '6 menit',
        tag: 'Bab 2', title: 'Kenapa Manajemen Risiko Penting?',
        content: () => `
          <div class="content-card fade-in">
            <h3>Bukan Sekadar Teori Korporasi</h3>
            <p>Manajemen risiko adalah cara yang tertib dan masuk akal untuk mengenali apa saja yang bisa salah, menilai seberapa gawat, lalu memutuskan apa yang akan dilakukan terhadapnya. Tujuan akhirnya bukan sekadar menghindari kerugian. Tujuannya adalah <strong>menciptakan dan melindungi nilai.</strong></p>
            <p>Bayangkan dua pemilik warung yang bersebelahan. Yang satu punya cadangan bahan dari dua pemasok berbeda. Yang satunya bergantung pada satu pemasok. Ketika pemasok tunggal itu tutup mendadak, warung pertama tetap buka, warung kedua terpaksa tutup. Itulah perbedaan yang dibuat manajemen risiko.</p>
          </div>
          <div class="content-card fade-in">
            <h3>Data yang Bicara</h3>
            <div class="stat-row">
              <div class="stat-box">
                <div class="val">70<span>%</span></div>
                <div class="lbl">Lebih mungkin mencapai tujuan strategis</div>
              </div>
              <div class="stat-box">
                <div class="val">20<span>%</span></div>
                <div class="lbl">Lebih sedikit gangguan operasional</div>
              </div>
            </div>
            <p style="margin-top:12px;font-size:13px;color:var(--gray-500)">Perusahaan dengan kerangka manajemen risiko yang jelas secara konsisten lebih stabil dibandingkan yang tidak punya. (Sumber: PXP, 2026)</p>
          </div>
          <div class="content-card fade-in">
            <h3>Empat Manfaat Nyata</h3>
            <div class="cat-grid">
              <div class="cat-card">
                <div class="cat-icon">🧠</div>
                <div class="cat-name">Keputusan Lebih Baik</div>
                <div class="cat-ex">Risiko diperhitungkan sebelum bertindak, bukan diratapi setelah kejadian.</div>
              </div>
              <div class="cat-card">
                <div class="cat-icon">🎯</div>
                <div class="cat-name">Sumber Daya Lebih Tepat</div>
                <div class="cat-ex">Energi dan uang dialokasikan ke tempat yang benar berdasarkan prioritas risiko.</div>
              </div>
              <div class="cat-card">
                <div class="cat-icon">🏋️</div>
                <div class="cat-name">Lebih Tangguh</div>
                <div class="cat-ex">Ketika kejutan datang, organisasi yang siap pulih jauh lebih cepat.</div>
              </div>
              <div class="cat-card">
                <div class="cat-icon">🤝</div>
                <div class="cat-name">Kepercayaan Tumbuh</div>
                <div class="cat-ex">Pelanggan, mitra, dan karyawan lebih percaya pada usaha yang terlihat profesional dan siap.</div>
              </div>
            </div>
          </div>
          <div class="content-card fade-in">
            <h3>Salah Kaprah yang Sering Terjadi</h3>
            <div class="highlight-box">
              <div class="hb-label">Mitos vs Kenyataan</div>
              <p><strong>Mitos:</strong> Manajemen risiko berarti menghindari semua risiko dan tidak berani bergerak.<br>
              <strong>Kenyataan:</strong> Manajemen risiko berarti mengelola risiko dengan sadar, tahu risiko mana yang layak diambil dan mana yang tidak. Berani mengambil risiko yang tepat justru menghasilkan pertumbuhan.</p>
            </div>
          </div>`
      },
      {
        id: 3, icon: '📚', time: '10 menit',
        tag: 'Bab 3', title: 'Dua Kerangka Dunia: ISO 31000 dan COSO ERM',
        hasQuiz: true,
        content: () => `
          <div class="content-card fade-in">
            <h3>ISO 31000: Panduan Utama Manajemen Risiko Internasional</h3>
            <p>ISO 31000 adalah standar internasional manajemen risiko yang diterbitkan oleh <em>International Organization for Standardization</em>. Standar ini berlaku untuk organisasi apa pun, tidak peduli ukuran atau sektornya. Versi terbaru keluar tahun 2018, dibuat lebih sederhana dan fleksibel.</p>
            <div class="gold-box">
              <div class="hb-label">Catatan Penting</div>
              <p>ISO 31000 <strong>tidak bisa disertifikasi.</strong> Tidak ada lembaga yang memberi cap "lulus ISO 31000" kepada perusahaan. Fungsinya adalah panduan dan praktik terbaik, bukan ujian.</p>
            </div>
            <p style="margin-top:12px;">ISO 31000 berdiri di atas <strong>tiga komponen</strong> yang saling menyangga:</p>
            <div class="steps-list">
              <div class="step-item">
                <div class="step-num">1</div>
                <div class="step-body">
                  <div class="step-title">Prinsip</div>
                  <div class="step-desc">Nilai-nilai dasar yang menentukan seperti apa manajemen risiko yang baik. Ada 8 prinsip: terintegrasi, terstruktur dan komprehensif, disesuaikan, inklusif, dinamis, memakai informasi terbaik, mempertimbangkan faktor manusia dan budaya, serta terus diperbaiki.</div>
                </div>
              </div>
              <div class="step-item">
                <div class="step-num">2</div>
                <div class="step-body">
                  <div class="step-title">Kerangka (Framework)</div>
                  <div class="step-desc">Susunan organisasi dan kepemimpinan yang memastikan manajemen risiko benar-benar berjalan, bukan sekadar ada di atas kertas. Meliputi komitmen pimpinan, integrasi ke tata kelola, dan alokasi sumber daya.</div>
                </div>
              </div>
              <div class="step-item">
                <div class="step-num">3</div>
                <div class="step-body">
                  <div class="step-title">Proses</div>
                  <div class="step-desc">Langkah-langkah praktis dari mengenali sampai menangani risiko secara sistematis. Ini yang akan kita pelajari detail di Bab 5.</div>
                </div>
              </div>
            </div>
          </div>
          <div class="content-card fade-in">

    function pct() {
      return Math.round((state.done.size / CHAPTERS.length) * 100);
    }
    function totalScore() {
      let s = 0, t = 0;
      Object.values(state.quizDone).forEach(r => { s += r.score; t += r.total; });
      return t > 0 ? Math.round((s/t)*100) : 0;
    }
    function quizScore(chId) {
      if (!state.qSubmitted[chId]) return null;
      const q = QUIZZES[chId];
      let score = 0;
      q.qs.forEach((item, qi) => {
        if ((state.qSel[chId] || {})[qi] === item.ans) score++;
      });
      return { score, total: q.qs.length };
    }

            ${ch.content()}
            ${quizHtml}
            <div class="content-card" style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
              ${isDone
                ? `<button class="btn-complete done" disabled>✓ Bab Selesai</button>`
                : `<button class="btn-complete" onclick="markDone(${ch.id})">Tandai Selesai &checkmark;</button>`}
              ${nextCh ? `<button class="btn-next" onclick="goChapter(${nextCh.id})">Bab ${nextCh.id}: ${nextCh.title} →</button>` : `<button class="btn-next" onclick="goDash()">Kembali ke Dashboard →</button>`}
            </div>
          </div>
        </div>
      </div>`;
    }

    /* ═══════════════════════════════════════════════
       RENDER: QUIZ
    ═══════════════════════════════════════════════ */
    function renderQuiz(chId) {
      const quiz = QUIZZES[chId];
      if (!quiz) return '';
      const submitted = !!state.qSubmitted[chId];
      const sel = state.qSel[chId] || {};

      const questions = quiz.qs.map((item, qi) => {
        const opts = item.opts.map((opt, oi) => {
          let cls = 'quiz-opt';
          let bubble = '';
          if (!submitted) {
            if (sel[qi] === oi) cls += ' selected';
            bubble = sel[qi] === oi ? '●' : '';
          } else {
            if (oi === item.ans) cls += ' correct';
            else if (sel[qi] === oi && oi !== item.ans) cls += ' wrong';
            bubble = oi === item.ans ? '✓' : (sel[qi] === oi ? '✗' : '');
          }
          const clickHnd = !submitted ? `onclick="selectOpt(${chId}, ${qi}, ${oi})"` : '';
          return `<div class="${cls}" ${clickHnd}>
            <div class="opt-bubble">${bubble}</div>
            <div class="opt-text">${opt}</div>
          </div>`;
        }).join('');

        const expHtml = submitted
          ? `<div style="margin-top:10px;padding:10px 12px;background:var(--teal-20);border-radius:8px;font-size:12px;color:var(--gray-700);line-height:1.6">
              <strong style="color:var(--teal)">💡 Penjelasan:</strong> ${item.exp}
            </div>`
          : '';

        return `<div class="quiz-q-card">
          <div class="quiz-q-num">Pertanyaan ${qi + 1} dari ${quiz.qs.length}</div>
          <div class="quiz-q-text">${item.q}</div>
          <div class="quiz-options">${opts}</div>
          ${expHtml}
        </div>`;
      }).join('');

      const allAnswered = quiz.qs.every((_, qi) => sel[qi] !== undefined);
      const resultHtml = submitted ? renderQuizResult(chId) : '';
      const submitBtn = !submitted
        ? `<button class="btn-submit-quiz" onclick="submitQuiz(${chId})" ${!allAnswered ? 'disabled' : ''}>
            ${!allAnswered ? `Jawab semua pertanyaan dulu (${Object.keys(sel).length}/${quiz.qs.length})` : 'Lihat Hasil Kuis ✓'}
          </button>`
        : '';

      return `<div class="quiz-section">
        <div class="quiz-header">
          <div class="quiz-icon">🧩</div>
          <div>
            <div class="quiz-tag">${quiz.subtitle}</div>
            <h3>${quiz.title}</h3>
          </div>
        </div>
        ${questions}
        ${submitBtn}
        ${resultHtml}
      </div>`;
    }

    function renderQuizResult(chId) {
      const r = quizScore(chId);
      if (!r) return '';
      const pct = Math.round((r.score / r.total) * 100);
      let cls = pct >= 80 ? 'good' : pct >= 50 ? 'avg' : 'low';
      let msg = pct >= 80
        ? ['Luar Biasa!', 'Pemahaman Anda sangat kuat. Lanjutkan ke bab berikutnya dengan percaya diri.']
        : pct >= 50
        ? ['Cukup Baik!', 'Beberapa konsep perlu diulang. Baca kembali bab terkait untuk memperkuat pemahaman.']
        : ['Perlu Diulang', 'Coba baca ulang materinya, lalu refresh halaman untuk mengerjakan kuis lagi.'];
      return `<div class="quiz-result">
        <div class="qr-score-row">
          <div class="qr-score-circle ${cls}">
            <div class="score-num">${r.score}</div>
            <div class="score-denom">/ ${r.total}</div>
          </div>
          <div class="qr-msg">
            <div class="qr-title">${msg[0]} ${pct}% benar</div>
            <div class="qr-sub">${msg[1]}</div>
          </div>
        </div>
      </div>`;
    }

    /* ═══════════════════════════════════════════════
       ACTIONS
    ═══════════════════════════════════════════════ */
    function doLogin() {
      const u = document.getElementById('uname').value.trim();
      const p = document.getElementById('upass').value;
      const err = document.getElementById('login-err');
      if (u === 'LizzLee' && p === 'manrisk17002005') {
        state.view = 'dashboard';
        render();
      } else {
        err.classList.add('show');
        document.querySelector('.login-card').style.animation = 'none';
        setTimeout(() => {
          document.querySelector('.login-input')?.closest('.login-card')?.classList.add('shake');
          err.classList.add('show');
        }, 10);
        setTimeout(() => {
          const card = document.querySelector('.login-card');
          if (card) { card.classList.remove('shake'); void card.offsetWidth; card.classList.add('shake'); }
        }, 50);
      }
    }
    function doLogout() { state.view = 'login'; render(); }
    function goDash()   { state.view = 'dashboard'; render(); }
    function goChapter(id) { state.chId = id; state.view = 'chapter'; render(); }
    function markDone(id) {
      state.done.add(id);
      render();
      document.getElementById('content-scroll')?.scrollTo({ top: 0, behavior: 'smooth' });
    }
    function selectOpt(chId, qi, oi) {
      if (state.qSubmitted[chId]) return;
      if (!state.qSel[chId]) state.qSel[chId] = {};
      state.qSel[chId][qi] = oi;
      const quiz = QUIZZES[chId];
      const sel = state.qSel[chId];
      const allAnswered = quiz.qs.every((_, i) => sel[i] !== undefined);
      // Re-render quiz section only for performance
      const r = quizScore(chId);
      // Update opts display
      const qCard = document.querySelectorAll('.quiz-q-card')[qi];
      if (qCard) {
        qCard.querySelectorAll('.quiz-opt').forEach((el, idx) => {
          el.classList.remove('selected');
          if (idx === oi) el.classList.add('selected');
          const bubble = el.querySelector('.opt-bubble');
          if (bubble) bubble.textContent = idx === oi ? '●' : '';
        });
      }
      // Update submit button
      const btn = document.querySelector('.btn-submit-quiz');
      if (btn) {
        const count = Object.keys(sel).length;
        if (allAnswered) {
          btn.disabled = false;
          btn.textContent = 'Lihat Hasil Kuis ✓';
        } else {
          btn.textContent = `Jawab semua pertanyaan dulu (${count}/${quiz.qs.length})`;
        }
      }
    }
    function submitQuiz(chId) {
      state.qSubmitted[chId] = true;
      const r = quizScore(chId);
      state.quizDone[chId] = r;
      render();
      setTimeout(() => {
        document.querySelector('.quiz-section')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 200);
    }

    /* ═══════════════════════════════════════════════
       RENDER ENGINE
    ═══════════════════════════════════════════════ */
    function render() {
      const app = document.getElementById('app');
      if (state.view === 'login')     app.innerHTML = renderLogin();
      else if (state.view === 'dashboard') app.innerHTML = renderDashboard();
      else if (state.view === 'chapter')   app.innerHTML = renderChapter();
    }

    /* ─── Keyboard support ─── */
    document.addEventListener('keydown', e => {
      if (state.view === 'login' && e.key === 'Enter') doLogin();
    });

    /* ─── INIT ─── */
    render();
  </script>
</body>
</html>
